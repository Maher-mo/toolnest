<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter - ToolNest</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

h1{
text-align:center;
color:#2563eb;
}

textarea{
width:100%;
height:220px;
padding:15px;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
resize:vertical;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.number{
font-size:32px;
font-weight:bold;
color:#2563eb;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#2563eb;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<a class="back" href="../index.html">⬅ Back to Home</a>

<h1>🔤 Word Counter</h1>

<textarea id="text" placeholder="Type or paste your text here..."></textarea>

<div class="stats">

<div class="card">
<div class="number" id="words">0</div>
Words
</div>

<div class="card">
<div class="number" id="characters">0</div>
Characters
</div>

<div class="card">
<div class="number" id="nospace">0</div>
Without Spaces
</div>

<div class="card">
<div class="number" id="sentences">0</div>
Sentences
</div>

<div class="card">
<div class="number" id="paragraphs">0</div>
Paragraphs
</div>

<div class="card">
<div class="number" id="reading">0 sec</div>
Reading Time
</div>

</div>

</div>

<script>
const text=document.getElementById("text");

text.addEventListener("input",function(){

let value=text.value;

let words=value.trim()===""?0:value.trim().split(/\s+/).length;

let characters=value.length;

let noSpace=value.replace(/\s/g,"").length;

let sentences=value.trim()===""?0:value.split(/[.!؟?]+/).filter(s=>s.trim()!="").length;

let paragraphs=value.trim()===""?0:value.split(/\n+/).filter(p=>p.trim()!="").length;

let reading=Math.ceil(words/200*60);

document.getElementById("words").innerText=words;
document.getElementById("characters").innerText=characters;
document.getElementById("nospace").innerText=noSpace;
document.getElementById("sentences").innerText=sentences;
document.getElementById("paragraphs").innerText=paragraphs;
document.getElementById("reading").innerText=reading+" sec";

});
</script>

</body>
</html>
