<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator - ToolNest</title>

<link rel="stylesheet" href="../style.css">

<style>
.container{
max-width:700px;
margin:30px auto;
padding:20px;
}

.result{
display:flex;
gap:10px;
margin:20px 0;
}

.result input{
flex:1;
padding:12px;
font-size:18px;
border:1px solid #ccc;
border-radius:8px;
}

.options{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

.option{
margin:12px 0;
}

input[type="range"]{
width:100%;
}
</style>

</head>

<body>

<div class="container">

<a href="../index.html">⬅ Back to Home</a>

<h1>🔐 Password Generator</h1>

<div class="result">
<input type="text" id="password" readonly>
<button onclick="copyPassword()">Copy</button>
</div>

<div class="options">

<div class="option">
Length:
<span id="lengthValue">16</span>
<input type="range" id="length" min="8" max="64" value="16">
</div>

<div class="option">
<label><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>
</div>

<div class="option">
<label><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label>
</div>

<div class="option">
<label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
</div>

<div class="option">
<label><input type="checkbox" id="symbols" checked> Symbols (!@#$)</label>
</div>

<button onclick="generatePassword()">Generate Password</button>

</div>

</div>
